name: Build and Deploy to Cloud Run

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: rag-backend
  REPOSITORY: rag-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - id: build
        name: Build and push image
        run: |
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_URL" .
          docker push "$IMAGE_URL"
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"

      - id: deploy
        name: Deploy to Cloud Run (free-tier-safe)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ steps.build.outputs.image_url }}
          env_vars: |
            RAG_ENV=dev
            RAG_PORT=8080
            RAG_QDRANT_HOST=${{ secrets.RAG_QDRANT_HOST }}
            RAG_QDRANT_API_KEY=${{ secrets.RAG_QDRANT_API_KEY }}
            RAG_QDRANT_COLLECTION=${{ secrets.RAG_QDRANT_COLLECTION }}
            RAG_GCP_PROJECT_ID=${{ secrets.RAG_GCP_PROJECT_ID }}
            RAG_GCS_BUCKET=${{ secrets.RAG_GCS_BUCKET }}
            RAG_FIRESTORE_DATABASE=${{ secrets.RAG_FIRESTORE_DATABASE }}
            RAG_GOOGLE_CLIENT_ID=${{ secrets.RAG_GOOGLE_CLIENT_ID }}
            RAG_GOOGLE_CLIENT_SECRET=${{ secrets.RAG_GOOGLE_CLIENT_SECRET }}
            RAG_JWT_SECRET_KEY=${{ secrets.RAG_JWT_SECRET_KEY }}
            RAG_OPENROUTER_API_KEY=${{ secrets.RAG_OPENROUTER_API_KEY }}
            RAG_LANGFUSE_ENABLED=${{ secrets.RAG_LANGFUSE_ENABLED }}
            RAG_LANGFUSE_SECRET_KEY=${{ secrets.RAG_LANGFUSE_SECRET_KEY }}
            RAG_LANGFUSE_PUBLIC_KEY=${{ secrets.RAG_LANGFUSE_PUBLIC_KEY }}
            RAG_LANGFUSE_HOST=${{ secrets.RAG_LANGFUSE_HOST }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=1
            --memory=512Mi
            --cpu=1
            --cpu-throttling
            --concurrency=20
            --timeout=300

      - name: Show deployed URL
        run: echo "${{ steps.deploy.outputs.url }}"
